name: Draft PDF

on:
  workflow_dispatch:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/draft-pdf.yml"

permissions:
  contents: read

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check paper sources
        run: |
          test -f paper/paper.md
          test -f paper/paper.bib
          ls -la paper

      - name: Build draft PDF
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}/paper:/data" \
            --user "$(id -u):$(id -g)" \
            --env JOURNAL=joss \
            openjournals/inara

      - name: Upload PDF
        uses: actions/upload-artifact@v5
        with:
          name: paper-pdf
          path: paper/paper.pdf
          if-no-files-found: error
